<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org" lang="en">

<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link th:rel="stylesheet" th:href="@{/webjars/bootstrap/css/bootstrap.min.css} "/>
</head>
<body>

    <h1>
        <span  th:text="${msg}" />
    </h1>

    <p th:text="${estado}" />

    <div class="container-fluid">
        <table class="table"  >
            <thead>
            <tr>
                <th>ID</th>
                <th>Nombre</th>
                <th>Descripcion</th>
                <th>Precio</th>
            </tr>
            </thead>
            <tbody>
                <tr th:each="item : ${productos}">
                    <td th:text="${item.id}"/>
                    <td th:text="${item.nombre}"/>
                    <td th:text="${item.descripcion}"/>
                    <td th:text="${item.precio}"/>
                </tr>
            </tbody>
        </table>
    </div>

</body>
</html>
